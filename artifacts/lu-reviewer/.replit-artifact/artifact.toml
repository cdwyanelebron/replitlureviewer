kind = "web"
previewPath = "/"
title = "LU Reviewer — BSIT 1st Year"
version = "1.0.0"
id = "artifacts/lu-reviewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24772

[services.development]
run = "pnpm --filter @workspace/lu-reviewer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lu-reviewer", "run", "build" ]
publicDir = "artifacts/lu-reviewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24772"
BASE_PATH = "/"
